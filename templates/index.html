<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div>
        <input id="display"
            class="w-full mb-4 p3 text-right text-2xl rounded bg-gray-700 text-white" readonly>
            <div class="grid grid-cols-4 gap-2">
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn bg-orange-500">/</button>

                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn bg-orange-500">*</button>

                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn bg-orange-500">-</button>

                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn bg-red-500">C</button>
                <button class="btn bg-orange-500">+</button>

                <button class="col-span-4 btn bg-green-500">=</button>
            </div>
    </div>

    <script src="static/script.js"></script>

    <style>
        .btn {
            @apply bg-gray-600 text-white p-3 rounded text-lg hover:bg-gray-500;
        }
    </style>
</body>
</html>
