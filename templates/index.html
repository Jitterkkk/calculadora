<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl w-80">
        <input id="display"
            class="w-full mb-4 p-4 text-right text-3xl rounded-lg bg-gray-700 text-white" readonly>
            <div class="grid grid-cols-4 gap-2">
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn-op">/</button>

                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn-op">*</button>

                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn-op">-</button>

                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn-clear">C</button>
                <button class="btn-op">+</button>

                <button class="btn-equals col-span-4">=</button>
            </div>
    </div>

    <script src="static/script.js"></script>

    <style>
        .btn{
background:#4b5563;
color:white;
padding:14px;
border-radius:10px;
font-size:18px;
}

.btn:hover{
background:#6b7280;
}

.btn-op{
background:#f97316;
color:white;
padding:14px;
border-radius:10px;
font-size:18px;
}

.btn-op:hover{
background:#fb923c;
}

.btn-clear{
background:#ef4444;
color:white;
padding:14px;
border-radius:10px;
font-size:18px;
}

.btn-equals{
background:#22c55e;
color:white;
padding:14px;
border-radius:10px;
font-size:18px;
}

    </style>
</body>
</html>
